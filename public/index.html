<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atingimento · Board Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #050505;
  --s1:      #0c0c0c;
  --border:  #181818;
  --text:    #d4d4d4;
  --muted:   #3a3a3a;
  --muted2:  #141414;
  --white:   #f0f0f0;
  --yellow:  #e8b800;
  --green:   #16a34a;
  --green2:  #22c55e;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── TOPO ── */
.topo {
  padding: 32px 56px 0;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.topo-mes {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
}

.topo-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.topo-updated {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.topo-timer {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.timer-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green2);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .3; }
}

/* ── MAIN ── */
main {
  padding: 48px 56px 60px;
  display: flex;
  flex-direction: column;
  gap: 64px;
}

/* ── BLOCO ── */
.bloco {}

.bloco-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 24px;
}

.bloco-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
}

.bloco-nums {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.bloco-nums strong {
  color: var(--text);
  font-weight: 500;
}

/* ── BARRA ── */
.bar-outer {
  position: relative;
}

.bar-track {
  height: 44px;
  background: var(--muted2);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}

.bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  border-radius: 3px;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
  max-width: 100%;
}

/* linhas divisórias */
.bar-div {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(0,0,0,0.6);
  z-index: 2;
}

/* % dentro da barra */
.bar-pct {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  z-index: 3;
  letter-spacing: .02em;
}

/* ── NÍVEIS ABAIXO ── */
.niveis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  margin-top: 1px;
  border: 1px solid var(--border);
  border-radius: 0 0 3px 3px;
  overflow: hidden;
}

.nivel {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
  position: relative;
}

.nivel:last-child { border-right: none; }

.nivel.atingido {
  background: rgba(22,163,74,.06);
}

.nivel.proximo {
  background: rgba(232,184,0,.04);
}

.nivel-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nivel-pct .check {
  font-size: 11px;
  color: var(--green2);
}

.nivel-nome {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nivel-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 3px;
}

.nivel-gap {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
}

/* ── ESTADO ── */
.estado {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; min-height: 60vh;
  color: var(--muted); font-size: 12px;
}

.spinner {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .topo, main { padding-left: 20px; padding-right: 20px; }
  .niveis { grid-template-columns: repeat(2, 1fr); }
  .nivel:nth-child(2) { border-right: none; }
  .nivel:nth-child(3) { border-top: 1px solid var(--border); }
  .nivel:nth-child(4) { border-top: 1px solid var(--border); border-right: none; }
}
</style>
</head>
<body>

<div class="topo">
  <span class="topo-mes" id="topo-mes">—</span>
  <div class="topo-right">
    <span class="topo-updated" id="topo-updated">—</span>
    <span class="topo-timer">
      <span class="timer-dot"></span>
      <span id="timer-txt">3:00</span>
    </span>
  </div>
</div>

<main id="main">
  <div class="estado"><div class="spinner"></div></div>
</main>

<script>
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const NIVEIS = [
  { pct: 71,  nome: 'Destrave dos Bônus'   },
  { pct: 85,  nome: 'Happy Hour'            },
  { pct: 95,  nome: 'Happy Hour Premium'    },
  { pct: 100, nome: 'Festa Completa'        },
];

// ── Timer 3min ──
let timerSecs = 180;
let timerInterval;

function iniciarTimer() {
  clearInterval(timerInterval);
  timerSecs = 180;
  atualizarTimerUI();
  timerInterval = setInterval(() => {
    timerSecs--;
    atualizarTimerUI();
    if (timerSecs <= 0) carregar();
  }, 1000);
}

function atualizarTimerUI() {
  const m = Math.floor(timerSecs / 60);
  const s = timerSecs % 60;
  document.getElementById('timer-txt').textContent =
    `${m}:${String(s).padStart(2,'0')}`;
}

// ── Formatação ──
function brl(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function pctFmt(v) {
  return Number(v).toFixed(1) + '%';
}

function corFill(pct) {
  if (pct >= 100) return 'linear-gradient(90deg,#14532d 0%,#16a34a 100%)';
  if (pct >= 95)  return 'linear-gradient(90deg,#14532d 0%,#22c55e 100%)';
  if (pct >= 85)  return 'linear-gradient(90deg,#713f12 0%,#ca8a04 100%)';
  if (pct >= 71)  return 'linear-gradient(90deg,#7c2d12 0%,#ea580c 100%)';
  return                 'linear-gradient(90deg,#450a0a 0%,#b91c1c 100%)';
}

function corNivel(pct, nivel_pct) {
  if (pct >= nivel_pct) return 'var(--green2)';
  const prox = NIVEIS.find(n => pct < n.pct);
  if (prox && prox.pct === nivel_pct) return 'var(--yellow)';
  return 'var(--muted)';
}

// ── Fetch ──
async function carregar() {
  try {
    const resp = await fetch('/api/dados');
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    render(data);
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="estado"><span style="color:#7f1d1d;font-size:11px">Erro: ${e.message}</span></div>`;
  }
  iniciarTimer();
}

// ── Render ──
function render(data) {
  const p   = data.periodo || {};
  const tot = data.total   || {};

  document.getElementById('topo-mes').textContent =
    MESES[(p.mes||1)-1] + ' ' + p.ano;
  document.getElementById('topo-updated').textContent =
    'Atualizado ' + p.atualizado_em;

  const fin_meta = tot.financeiro?.meta      || 0;
  const fin_real = tot.financeiro?.realizado  || 0;
  const fin_pct  = fin_meta ? fin_real / fin_meta * 100 : 0;

  const reu_meta = tot.reunioes?.meta       || 0;
  const reu_real = tot.reunioes?.validadas   || 0;
  const reu_pct  = reu_meta ? reu_real / reu_meta * 100 : 0;

  document.getElementById('main').innerHTML = `
    ${bloco({
      label:    'Meta Financeira',
      real_str: brl(fin_real),
      meta_str: brl(fin_meta),
      pct:      fin_pct,
      meta:     fin_meta,
      fmt_val:  v => brl(v),
      fmt_gap:  v => brl(v),
    })}
    ${bloco({
      label:    'Meta de Reuniões',
      real_str: reu_real + ' reuniões',
      meta_str: Math.round(reu_meta) + ' reuniões',
      pct:      reu_pct,
      meta:     reu_meta,
      fmt_val:  v => Math.round(v) + ' reu.',
      fmt_gap:  v => Math.round(v) + ' reu.',
    })}
  `;
}

function bloco({ label, real_str, meta_str, pct, meta, fmt_val, fmt_gap }) {
  const barW = Math.min(pct, 100);

  const divs = NIVEIS.map(n =>
    `<div class="bar-div" style="left:${n.pct}%"></div>`
  ).join('');

  const niveis = NIVEIS.map(n => {
    const cor      = corNivel(pct, n.pct);
    const atingido = pct >= n.pct;
    const proximo  = !atingido && NIVEIS.find(x => pct < x.pct)?.pct === n.pct;
    const val      = fmt_val(meta * n.pct / 100);
    const gap      = fmt_gap(Math.max(meta * n.pct / 100 - (meta * pct / 100), 0));

    return `
    <div class="nivel ${atingido ? 'atingido' : proximo ? 'proximo' : ''}">
      <div class="nivel-pct" style="color:${cor}">
        ${n.pct}%
        ${atingido ? '<span class="check">✓</span>' : ''}
      </div>
      <div class="nivel-nome">${n.nome}</div>
      <div class="nivel-val">${val}</div>
      <div class="nivel-gap" style="color:${atingido ? 'var(--green2)' : proximo ? 'var(--yellow)' : 'var(--muted)'}">
        ${atingido ? 'Atingido' : 'Falta ' + gap}
      </div>
    </div>`;
  }).join('');

  return `
  <div class="bloco">
    <div class="bloco-top">
      <span class="bloco-label">${label}</span>
      <span class="bloco-nums"><strong>${real_str}</strong> / ${meta_str}</span>
    </div>
    <div class="bar-outer">
      <div class="bar-track">
        <div class="bar-fill" style="width:${barW}%;background:${corFill(pct)}"></div>
        ${divs}
        <div class="bar-pct">${pctFmt(pct)}</div>
      </div>
      <div class="niveis">${niveis}</div>
    </div>
  </div>`;
}

carregar();
</script>
</body>
</html>
