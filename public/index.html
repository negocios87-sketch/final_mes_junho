<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atingimento · Board Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0a0a0a;
  --s1:     #111;
  --border: #1e1e1e;
  --text:   #efefef;
  --muted:  #444;
  --muted2: #1a1a1a;
  --yellow: #f5c800;
  --green:  #22c55e;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

header {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--s1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.h-left { display: flex; align-items: center; gap: 14px; }

.logo {
  background: var(--yellow);
  color: #000;
  font-weight: 900;
  font-size: 12px;
  width: 36px; height: 36px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}

.h-title { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
.h-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

.btn-refresh {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  display: flex; align-items: center; gap: 6px;
  transition: .15s;
}
.btn-refresh:hover { border-color: var(--yellow); color: var(--yellow); }
.btn-refresh.loading { opacity: .4; pointer-events: none; }

main {
  padding: 60px 48px;
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 56px;
}

/* BLOCO */
.bloco { }

.bloco-titulo {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.bloco-titulo span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
}

/* BARRA */
.bar-wrap {
  position: relative;
  margin-bottom: 0;
}

/* Faixas coloridas de fundo */
.bar-track {
  height: 52px;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  background: var(--muted2);
  display: flex;
}

/* segmentos de fundo com cor fraca */
.seg {
  height: 100%;
  position: absolute;
  top: 0;
}

/* preenchimento real */
.bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  border-radius: 8px;
  transition: width 1.1s cubic-bezier(.4,0,.2,1);
  z-index: 2;
}

/* linhas divisórias dos níveis */
.bar-mark {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: rgba(0,0,0,0.5);
  z-index: 3;
}

/* texto dentro da barra (% atual) */
.bar-pct-inside {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  z-index: 4;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* labels abaixo da barra */
.bar-labels {
  display: flex;
  position: relative;
  margin-top: 10px;
  height: 40px;
}

.bar-label-item {
  position: absolute;
  transform: translateX(-50%);
  text-align: center;
  line-height: 1.3;
}

.bar-label-item .l-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  display: block;
}

.bar-label-item .l-nome {
  font-size: 9px;
  color: var(--muted);
  display: block;
  white-space: nowrap;
}

/* estado */
.estado {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 100px;
  color: var(--muted); font-size: 13px;
}

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--muted2);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.updated {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="logo">BA</div>
    <div>
      <div class="h-title">Atingimento de Meta</div>
      <div class="h-sub" id="h-sub">—</div>
    </div>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="carregar()">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2"/>
      <polyline points="10,1.5 14.5,1.5 14.5,6"/>
    </svg>
    Atualizar
  </button>
</header>

<main id="main">
  <div class="estado"><div class="spinner"></div><span>Carregando...</span></div>
</main>

<script>
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const NIVEIS = [
  { pct: 71,  nome: 'Destrave dos Bônus',    cor: '#854d0e' },
  { pct: 85,  nome: 'Happy Hour 🍻',          cor: '#713f12' },
  { pct: 95,  nome: 'Happy Hour Premium 🥂',  cor: '#365314' },
  { pct: 100, nome: 'Festa Completa 🎊',       cor: '#14532d' },
];

function brl(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function pctFmt(v) {
  return Number(v).toFixed(1) + '%';
}

function corFill(pct) {
  if (pct >= 100) return 'linear-gradient(90deg,#15803d,#22c55e)';
  if (pct >= 95)  return 'linear-gradient(90deg,#166534,#4ade80)';
  if (pct >= 85)  return 'linear-gradient(90deg,#ca8a04,#f5c800)';
  if (pct >= 71)  return 'linear-gradient(90deg,#c2410c,#f97316)';
  return 'linear-gradient(90deg,#991b1b,#ef4444)';
}

function corLabel(pct, nivel_pct) {
  if (pct >= nivel_pct) return 'var(--green)';
  // próximo a bater
  const prox = NIVEIS.find(n => pct < n.pct);
  if (prox && prox.pct === nivel_pct) return 'var(--yellow)';
  return 'var(--muted)';
}

async function carregar() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  document.getElementById('main').innerHTML =
    '<div class="estado"><div class="spinner"></div><span>Buscando dados...</span></div>';
  try {
    const resp = await fetch('/api/dados');
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    render(data);
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="estado"><span style="color:#ef4444">Erro: ${e.message}</span></div>`;
  } finally {
    btn.classList.remove('loading');
  }
}

function render(data) {
  const p   = data.periodo || {};
  const tot = data.total   || {};

  document.getElementById('h-sub').textContent =
    `${MESES[(p.mes||1)-1]}/${p.ano} · ${p.du_passados} de ${p.du_total} dias úteis · ${p.atualizado_em}`;

  const fin_meta = tot.financeiro?.meta      || 0;
  const fin_real = tot.financeiro?.realizado  || 0;
  const fin_pct  = fin_meta ? fin_real / fin_meta * 100 : 0;

  const reu_meta = tot.reunioes?.meta       || 0;
  const reu_real = tot.reunioes?.validadas   || 0;
  const reu_pct  = reu_meta ? reu_real / reu_meta * 100 : 0;

  document.getElementById('main').innerHTML = `
    ${barra({
      titulo:   'Meta Financeira · Closers',
      real_str: brl(fin_real),
      meta_str: brl(fin_meta),
      pct:      fin_pct,
      meta:     fin_meta,
      fmt:      v => brl(v),
    })}

    ${barra({
      titulo:   'Meta de Reuniões · SDRs',
      real_str: reu_real + ' reuniões',
      meta_str: reu_meta + ' reuniões',
      pct:      reu_pct,
      meta:     reu_meta,
      fmt:      v => Math.round(v) + ' reu.',
    })}

    <div class="updated">Atualizado em ${p.atualizado_em}</div>
  `;
}

function barra({ titulo, real_str, meta_str, pct, meta, fmt }) {
  const barW = Math.min(pct, 100);

  const marks = NIVEIS.map(n =>
    `<div class="bar-mark" style="left:${n.pct}%"></div>`
  ).join('');

  const labels = NIVEIS.map(n => {
    const cor  = corLabel(pct, n.pct);
    const val  = fmt(meta * n.pct / 100);
    const icon = pct >= n.pct ? ' ✓' : '';
    return `
    <div class="bar-label-item" style="left:${n.pct}%">
      <span class="l-pct" style="color:${cor}">${n.pct}%${icon}</span>
      <span class="l-nome">${n.nome}</span>
      <span class="l-nome" style="color:${cor}">${val}</span>
    </div>`;
  }).join('');

  return `
  <div class="bloco">
    <div class="bloco-titulo">
      ${titulo}
      <span style="color:var(--muted)">${real_str} / ${meta_str}</span>
    </div>
    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" style="width:${barW}%;background:${corFill(pct)}"></div>
        ${marks}
        <div class="bar-pct-inside">${pctFmt(pct)}</div>
      </div>
      <div class="bar-labels">${labels}</div>
    </div>
  </div>`;
}

carregar();
</script>
</body>
</html>
