<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atingimento · Board Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #050505;
  --s1:     #0d0d0d;
  --border: #181818;
  --text:   #c8c8c8;
  --muted:  #383838;
  --muted2: #111;
  --white:  #efefef;
  --y4:     #e8b800;
  --green:  #22c55e;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.topo {
  padding: 28px 52px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topo-mes {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .24em;
  text-transform: uppercase;
  color: var(--muted);
}

.topo-right {
  display: flex;
  align-items: center;
  gap: 18px;
}

.topo-updated {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.topo-timer {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.timer-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50%      { opacity:.3; }
}

main {
  padding: 44px 52px 60px;
  display: flex;
  flex-direction: column;
  gap: 48px;
}

.bloco-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.bloco-nums {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 14px;
}

.bloco-nums strong {
  color: var(--white);
  font-weight: 600;
}

/* GAP de reuniões inline */
.reu-gap-inline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-left: 14px;
}

.reu-gap-inline span {
  color: var(--y4);
  font-weight: 700;
}

/* ── BARRA ── */
.bar-wrap {
  position: relative;
  padding-bottom: 28px;
}

.bar-track {
  height: 48px;
  background: var(--muted2);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
}

.bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  border-radius: 4px;
  transition: width 1.3s cubic-bezier(.4,0,.2,1);
  max-width: 100%;
  background: linear-gradient(90deg, #3d2e00 0%, #7a5c00 30%, #b88a00 60%, #e8b800 85%, #ffd54f 100%);
}

.bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -150%;
  width: 80%;
  height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
  animation: shimmer 2.4s ease-in-out infinite;
}

@keyframes shimmer {
  0%   { left: -150%; }
  100% { left: 200%; }
}

.bar-div {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(0,0,0,0.6);
  z-index: 2;
}

.bar-nivel-label {
  position: absolute;
  top: 52px;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 3;
}

.bar-nivel-label .nl-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  display: block;
}

.bar-pct {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  z-index: 4;
  text-shadow: 0 1px 6px rgba(0,0,0,0.6);
}

/* ── PRÊMIOS ── */
.prem-titulo {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.prem-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.prem-item {
  padding: 16px 18px;
  border-right: 1px solid var(--border);
  position: relative;
}

.prem-item:last-child { border-right: none; }
.prem-item.festa      { background: rgba(232,184,0,.04); }
.prem-item.atingido   { background: rgba(22,197,94,.04); }

.prem-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--muted);
}

.prem-nome {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 12px;
}

.prem-item.festa .prem-nome {
  color: var(--y4);
  font-weight: 600;
}

.prem-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 8px;
}

/* CARIMBO */
.prem-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
}

.prem-status.nao {
  color: var(--muted);
  border: 1px solid var(--border);
  background: transparent;
}

.prem-status.sim {
  color: var(--green);
  border: 1px solid rgba(34,197,94,.3);
  background: rgba(34,197,94,.06);
}

.prem-status.sim::before {
  content: '✓';
  font-size: 11px;
}

/* ── ESTADO ── */
.estado {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; min-height: 70vh;
  color: var(--muted); font-size: 12px;
}

.spinner {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border);
  border-top-color: var(--y4);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .topo, main { padding-left: 18px; padding-right: 18px; }
  .prem-grid { grid-template-columns: repeat(2,1fr); }
  .prem-item:nth-child(2) { border-right: none; }
  .prem-item:nth-child(3) { border-top: 1px solid var(--border); }
  .prem-item:nth-child(4) { border-top: 1px solid var(--border); border-right: none; }
}
</style>
</head>
<body>

<div class="topo">
  <span class="topo-mes" id="topo-mes">—</span>
  <div class="topo-right">
    <span class="topo-updated" id="topo-updated">—</span>
    <span class="topo-timer">
      <span class="timer-dot"></span>
      <span id="timer-txt">5:00</span>
    </span>
  </div>
</div>

<main id="main">
  <div class="estado"><div class="spinner"></div></div>
</main>

<script>
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const NIVEIS = [
  { pct: 71,  nome: 'Destrave dos Bônus'   },
  { pct: 85,  nome: 'Happy Hour 🍻'         },
  { pct: 95,  nome: 'Happy Hour Premium 🥂' },
  { pct: 100, nome: 'Festa Completa 🎊'     },
];

let timerSecs = 300;
let timerInterval;

function iniciarTimer() {
  clearInterval(timerInterval);
  timerSecs = 600;
  atualizarTimerUI();
  timerInterval = setInterval(() => {
    timerSecs--;
    atualizarTimerUI();
    if (timerSecs <= 0) carregar();
  }, 1000);
}

function atualizarTimerUI() {
  const m = Math.floor(timerSecs / 60);
  const s = timerSecs % 60;
  document.getElementById('timer-txt').textContent = `${m}:${String(s).padStart(2,'0')}`;
}

function brl(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function pctFmt(v) { return Number(v).toFixed(1) + '%'; }

function corNivel(pct, nivel_pct) {
  if (pct >= nivel_pct) return 'var(--green)';
  const prox = NIVEIS.find(n => pct < n.pct);
  if (prox && prox.pct === nivel_pct) return 'var(--y4)';
  return 'var(--muted)';
}

async function carregar() {
  try {
    const resp = await fetch('/api/dados');
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    render(data);
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="estado"><span style="color:#7f1d1d;font-size:11px">Erro: ${e.message}</span></div>`;
  }
  iniciarTimer();
}

function barra(pct) {
  const barW = Math.min(pct, 100);
  const divs = NIVEIS.map(n => {
    const cor = corNivel(pct, n.pct);
    return `
      <div class="bar-div" style="left:${n.pct}%"></div>
      <div class="bar-nivel-label" style="left:${n.pct}%">
        <span class="nl-pct" style="color:${cor}">${n.pct}%</span>
      </div>`;
  }).join('');

  return `
  <div class="bar-wrap">
    <div class="bar-track">
      <div class="bar-fill" style="width:${barW}%"></div>
      ${divs}
      <div class="bar-pct">${pctFmt(pct)}</div>
    </div>
  </div>`;
}

function premios(pct, meta) {
  const items = NIVEIS.map(n => {
    const atingido = pct >= n.pct;
    const festa    = n.pct === 100;
    const val      = meta * n.pct / 100;
    const gap      = Math.max(val - (meta * pct / 100), 0);

    return `
    <div class="prem-item ${festa?'festa':''} ${atingido?'atingido':''}">
      <div class="prem-pct">${n.pct}%</div>
      <div class="prem-nome">${n.nome}</div>
      <div class="prem-val">${brl(val)}</div>
      ${atingido
        ? `<div class="prem-status sim">Conquistado</div>`
        : `<div style="margin-bottom:4px"><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--muted)">GAP ${brl(gap)}</span></div>
           <div class="prem-status nao">Não conquistado</div>`
      }
    </div>`;
  }).join('');

  return `<div class="prem-grid">${items}</div>`;
}

function render(data) {
  const p   = data.periodo || {};
  const tot = data.total   || {};

  document.getElementById('topo-mes').textContent = MESES[(p.mes||1)-1] + ' ' + p.ano;
  document.getElementById('topo-updated').textContent = 'Atualizado ' + p.atualizado_em;

  const fin_meta = tot.financeiro?.meta      || 0;
  const fin_real = tot.financeiro?.realizado  || 0;
  const fin_pct  = fin_meta ? fin_real / fin_meta * 100 : 0;

  const reu_meta = tot.reunioes?.meta       || 0;
  const reu_real = tot.reunioes?.validadas   || 0;
  const reu_pct  = reu_meta ? reu_real / reu_meta * 100 : 0;
  const reu_gap  = Math.max(reu_meta - reu_real, 0);

  document.getElementById('main').innerHTML = `
    <div>
      <div class="bloco-label">Meta Financeira · Closers</div>
      <div class="bloco-nums"><strong>${brl(fin_real)}</strong> / ${brl(fin_meta)}</div>
      ${barra(fin_pct)}
    </div>

    <div>
      <div class="bloco-label">Meta de Reuniões · SDRs · a partir de hoje</div>
      <div class="bloco-nums">
        <strong>${reu_real} reuniões</strong> / ${reu_meta} reuniões
        ${reu_gap > 0
          ? `<span class="reu-gap-inline">· GAP <span>${reu_gap} reu.</span></span>`
          : `<span class="reu-gap-inline" style="color:var(--green)">· ✓ Meta batida</span>`
        }
      </div>
      ${barra(reu_pct)}
    </div>

    <div>
      <div class="prem-titulo">Premiações</div>
      ${premios(fin_pct, fin_meta)}
    </div>
  `;
}

carregar();
</script>
</body>
</html>
