<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atingimento · Board Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #050505;
  --s1:     #0d0d0d;
  --border: #181818;
  --text:   #c8c8c8;
  --muted:  #383838;
  --muted2: #111;
  --white:  #efefef;
  --y4:     #e8b800;
  --green:  #22c55e;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.topo {
  padding: 36px 52px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.topo-eyebrow {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.topo-titulo {
  font-size: 36px;
  font-weight: 900;
  letter-spacing: -.01em;
  line-height: 1;
  color: var(--white);
}

.topo-titulo .destaque { color: var(--y4); }

.topo-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  padding-top: 4px;
}

.topo-updated {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.topo-timers {
  display: flex;
  gap: 12px;
}

.timer-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.timer-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

.timer-dot.fin { background: var(--y4); }
.timer-dot.reu { background: var(--green); }

@keyframes pulse {
  0%,100% { opacity:1; }
  50%      { opacity:.3; }
}

main {
  padding: 44px 52px 60px;
  display: flex;
  flex-direction: column;
  gap: 48px;
}

.bloco-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.bloco-nums {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 0;
}

.bloco-nums strong { color: var(--white); font-weight: 600; }

.reu-gap-inline { margin-left: 14px; }
.reu-gap-inline span { color: var(--y4); font-weight: 700; }

/* skeleton loading */
.skeleton {
  background: linear-gradient(90deg, var(--muted2) 25%, #1a1a1a 50%, var(--muted2) 75%);
  background-size: 200% 100%;
  animation: skeleton 1.4s ease-in-out infinite;
  border-radius: 4px;
}
@keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── BARRA ── */
.bar-wrap { position: relative; padding-bottom: 28px; }

.bar-track {
  height: 48px;
  background: var(--muted2);
  border-radius: 4px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
}

.bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  border-radius: 4px;
  transition: width 1.3s cubic-bezier(.4,0,.2,1);
  max-width: 100%;
  background: linear-gradient(90deg, #3d2e00 0%, #7a5c00 30%, #b88a00 60%, #e8b800 85%, #ffd54f 100%);
}

.bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -150%;
  width: 80%;
  height: 100%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
  animation: shimmer 2.4s ease-in-out infinite;
}

@keyframes shimmer { 0% { left:-150%; } 100% { left:200%; } }

.bar-div {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: rgba(0,0,0,0.6);
  z-index: 2;
}

.bar-nivel-label {
  position: absolute;
  top: 52px;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
  z-index: 3;
}

.bar-nivel-label .nl-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  display: block;
}

.bar-pct {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  z-index: 4;
  text-shadow: 0 1px 6px rgba(0,0,0,0.6);
}

/* ── PRÊMIOS ── */
.prem-titulo {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.prem-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.prem-item {
  padding: 16px 18px;
  border-right: 1px solid var(--border);
}

.prem-item:last-child { border-right: none; }
.prem-item.festa      { background: rgba(232,184,0,.04); }
.prem-item.atingido   { background: rgba(34,197,94,.04); }

.prem-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--muted);
}

.prem-nome { font-size: 10px; color: var(--muted); margin-bottom: 12px; }
.prem-item.festa .prem-nome { color: var(--y4); font-weight: 600; }
.prem-item.festa .prem-pct { color: var(--y4); }
.prem-item.festa .prem-val { color: var(--y4); }
.prem-item.festa .prem-gap { color: var(--y4) !important; }
.prem-item.festa .prem-status.nao { color: var(--y4) !important; border-color: rgba(232,184,0,.3); }
.prem-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 8px; }

.prem-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
}

.prem-status.nao { color: var(--muted); border: 1px solid var(--border); }
.prem-status.sim { color: var(--green); border: 1px solid rgba(34,197,94,.3); background: rgba(34,197,94,.06); }
.prem-status.sim::before { content: '✓ '; }

/* ── ESTADO ── */
.estado {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; min-height: 70vh;
  color: var(--muted); font-size: 12px;
}

.spinner {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border);
  border-top-color: var(--y4);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .topo, main { padding-left: 18px; padding-right: 18px; }
  .topo-titulo { font-size: 24px; }
  .prem-grid { grid-template-columns: repeat(2,1fr); }
  .prem-item:nth-child(2) { border-right: none; }
  .prem-item:nth-child(3) { border-top: 1px solid var(--border); }
  .prem-item:nth-child(4) { border-top: 1px solid var(--border); border-right: none; }
}
</style>
</head>
<body>

<div class="topo">
  <div>
    <div class="topo-eyebrow">Board Academy · Comercial</div>
    <div class="topo-titulo">
      Reta Final <span class="destaque" id="topo-mes">—</span>
    </div>
  </div>
  <div class="topo-right">
    <span class="topo-updated" id="topo-updated">—</span>
    <div class="topo-timers">
      <span class="timer-chip">
        <span class="timer-dot fin"></span>
        <span>Ganhos <span id="timer-fin">10:00</span></span>
      </span>
      <span class="timer-chip">
        <span class="timer-dot reu"></span>
        <span>Reuniões <span id="timer-reu">5:00</span></span>
      </span>
    </div>
  </div>
</div>

<main id="main">
  <div class="estado"><div class="spinner"></div></div>
</main>

<script>
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const NIVEIS = [
  { pct: 71,  nome: 'Destrave dos Bônus'   },
  { pct: 85,  nome: 'Happy Hour 🍻'         },
  { pct: 95,  nome: 'Happy Hour Premium 🥂' },
  { pct: 100, nome: 'Festa Completa 🎊'     },
];

// Estado global
let estado = {
  fin: null,
  reu: null,
  periodo: null,
};

// ── Timers independentes ──
let timerFin = 600, timerReu = 300;
let intervaloFin, intervaloReu;

function iniciarTimerFin() {
  clearInterval(intervaloFin);
  timerFin = 600;
  intervaloFin = setInterval(() => {
    timerFin--;
    atualizarTimerUI('fin', timerFin);
    if (timerFin <= 0) carregarFinanceiro();
  }, 1000);
}

function iniciarTimerReu() {
  clearInterval(intervaloReu);
  timerReu = 300;
  intervaloReu = setInterval(() => {
    timerReu--;
    atualizarTimerUI('reu', timerReu);
    if (timerReu <= 0) carregarReunioes();
  }, 1000);
}

function atualizarTimerUI(tipo, secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  document.getElementById(`timer-${tipo}`).textContent = `${m}:${String(s).padStart(2,'0')}`;
}

// ── Fetch ──
async function carregarFinanceiro() {
  try {
    const resp = await fetch('/api/financeiro');
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    estado.fin     = data.financeiro;
    estado.periodo = data.periodo;
    atualizarHeader();
    renderizar();
  } catch(e) {
    console.error('Financeiro erro:', e.message);
  }
  iniciarTimerFin();
}

async function carregarReunioes() {
  try {
    const resp = await fetch('/api/reunioes');
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    estado.reu = data.reunioes;
    renderizar();
  } catch(e) {
    console.error('Reuniões erro:', e.message);
  }
  iniciarTimerReu();
}

function atualizarHeader() {
  const p = estado.periodo || {};
  document.getElementById('topo-mes').textContent =
    MESES[(p.mes||1)-1].toUpperCase() + ' ' + p.ano;
  document.getElementById('topo-updated').textContent =
    'Atualizado ' + p.atualizado_em;
}

// ── Format ──
function brl(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function pctFmt(v) { return Number(v).toFixed(1) + '%'; }

function corNivel(pct, nivel_pct) {
  if (pct >= nivel_pct) return 'var(--green)';
  const prox = NIVEIS.find(n => pct < n.pct);
  if (prox && prox.pct === nivel_pct) return 'var(--y4)';
  return 'var(--muted)';
}

function barra(pct) {
  const barW = Math.min(pct, 100);
  const divs = NIVEIS.map(n => {
    const cor = corNivel(pct, n.pct);
    return `
      <div class="bar-div" style="left:${n.pct}%"></div>
      <div class="bar-nivel-label" style="left:${n.pct}%">
        <span class="nl-pct" style="color:${cor}">${n.pct}%</span>
      </div>`;
  }).join('');
  return `
  <div class="bar-wrap">
    <div class="bar-track">
      <div class="bar-fill" style="width:${barW}%"></div>
      ${divs}
      <div class="bar-pct">${pctFmt(pct)}</div>
    </div>
  </div>`;
}

function barraLoading() {
  return `
  <div class="bar-wrap">
    <div class="bar-track skeleton" style="height:48px"></div>
  </div>`;
}

function premios(pct, meta) {
  const items = NIVEIS.map(n => {
    const atingido = pct >= n.pct;
    const festa    = n.pct === 100;
    const cor      = corNivel(pct, n.pct);
    const val      = meta * n.pct / 100;
    const gap      = Math.max(val - (meta * pct / 100), 0);
    return `
    <div class="prem-item ${festa?'festa':''} ${atingido?'atingido':''}">
      <div class="prem-pct">${n.pct}%</div>
      <div class="prem-nome">${n.nome}</div>
      <div class="prem-val">${brl(val)}</div>
      ${atingido
        ? `<div class="prem-status sim">Conquistado</div>`
        : `<div style="margin-bottom:6px"><span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--muted)">GAP ${brl(gap)}</span></div>
           <div class="prem-status nao">Não conquistado</div>`
      }
    </div>`;
  }).join('');
  return `<div class="prem-grid">${items}</div>`;
}

function renderizar() {
  const fin = estado.fin;
  const reu = estado.reu;

  const fin_meta = fin?.meta      || 0;
  const fin_real = fin?.realizado  || 0;
  const fin_pct  = fin_meta ? fin_real / fin_meta * 100 : 0;

  const reu_meta = reu?.meta       || 0;
  const reu_real = reu?.validadas   || 0;
  const reu_pct  = reu_meta ? reu_real / reu_meta * 100 : 0;
  const reu_gap  = Math.max(reu_meta - reu_real, 0);

  document.getElementById('main').innerHTML = `
    <div>
      <div class="bloco-label">Meta Financeira · Closers</div>
      <div class="bloco-nums">
        ${fin ? `<strong>${brl(fin_real)}</strong> / ${brl(fin_meta)}` : '<span style="color:var(--muted)">Carregando...</span>'}
      </div>
      ${fin ? barra(fin_pct) : barraLoading()}
    </div>

    <div>
      <div class="bloco-label">Meta de Reuniões · SDRs · a partir de 22/06</div>
      <div class="bloco-nums">
        ${reu
          ? `<strong>${reu_real} reuniões</strong> / ${reu_meta} reuniões
             <span class="reu-gap-inline">
               ${reu_gap > 0
                 ? `· GAP <span>${reu_gap} reu.</span>`
                 : `<span style="color:var(--green)">· ✓ Meta batida</span>`
               }
             </span>`
          : '<span style="color:var(--muted)">Carregando...</span>'
        }
      </div>
      ${reu ? barra(reu_pct) : barraLoading()}
    </div>

    ${fin ? `
    <div>
      <div class="prem-titulo">Premiações</div>
      ${premios(fin_pct, fin_meta)}
    </div>` : ''}
  `;
}

// ── Inicializa ──
document.getElementById('main').innerHTML =
  '<div class="estado"><div class="spinner"></div></div>';

// Carrega as duas em paralelo
Promise.all([carregarFinanceiro(), carregarReunioes()]);
</script>
</body>
</html>
