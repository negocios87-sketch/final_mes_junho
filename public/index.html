<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atingimento · Board Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0a0a0a;
  --s1:     #111;
  --border: #1e1e1e;
  --text:   #efefef;
  --muted:  #444;
  --muted2: #1e1e1e;
  --yellow: #f5c800;
  --green:  #22c55e;
  --red:    #ef4444;
  --orange: #f97316;
  --blue:   #60a5fa;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--s1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.h-left { display: flex; align-items: center; gap: 14px; }

.logo {
  background: var(--yellow);
  color: #000;
  font-weight: 900;
  font-size: 12px;
  width: 36px; height: 36px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}

.h-title { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
.h-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

.btn-refresh {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  display: flex; align-items: center; gap: 6px;
  transition: .15s;
}
.btn-refresh:hover { border-color: var(--yellow); color: var(--yellow); }
.btn-refresh.loading { opacity: .4; pointer-events: none; }

/* MAIN */
main {
  padding: 48px 40px;
  max-width: 1100px;
  margin: 0 auto;
}

/* BLOCO DE BARRA */
.barra-bloco {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 40px;
  margin-bottom: 24px;
}

.barra-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
}

.barra-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.barra-valor {
  font-family: 'JetBrains Mono', monospace;
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
}

.barra-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  text-align: right;
}

.barra-pct-big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
  text-align: right;
}

/* BARRA PRINCIPAL */
.prog-container {
  position: relative;
  margin-bottom: 10px;
}

.prog-track {
  background: var(--muted2);
  border-radius: 6px;
  height: 28px;
  position: relative;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
  max-width: 100%;
  position: relative;
}

/* Marcações dos níveis NA barra */
.nivel-mark {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  z-index: 2;
}

.nivel-mark-line {
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

/* Labels dos níveis ABAIXO da barra */
.niveis-labels {
  position: relative;
  height: 36px;
  margin-top: 4px;
}

.nivel-label {
  position: absolute;
  transform: translateX(-50%);
  text-align: center;
}

.nivel-label .nl-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  display: block;
  margin-bottom: 1px;
}

.nivel-label .nl-nome {
  font-size: 9px;
  color: var(--muted);
  white-space: nowrap;
}

/* STATUS DOS NÍVEIS */
.niveis-status {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 28px;
}

.nivel-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}

.nivel-card.atingido {
  border-color: var(--green);
  background: rgba(34,197,94,.04);
}

.nivel-card.proximo {
  border-color: var(--yellow);
  background: rgba(245,200,0,.04);
}

.nivel-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: .06em;
}

.nivel-pct-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}

.nivel-nome {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}

.nivel-valor {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
}

.nivel-gap {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
}

.nivel-check {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 16px;
}

/* ESTADO */
.estado {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 100px;
  color: var(--muted); font-size: 13px;
}

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--muted2);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.updated {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 8px;
}

@media (max-width: 700px) {
  main { padding: 20px 16px; }
  .barra-bloco { padding: 24px 20px; }
  .barra-valor { font-size: 28px; }
  .barra-pct-big { font-size: 32px; }
  .niveis-status { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="logo">BA</div>
    <div>
      <div class="h-title">Atingimento de Meta</div>
      <div class="h-sub" id="h-sub">—</div>
    </div>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="carregar()">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2"/>
      <polyline points="10,1.5 14.5,1.5 14.5,6"/>
    </svg>
    Atualizar
  </button>
</header>

<main id="main">
  <div class="estado"><div class="spinner"></div><span>Carregando...</span></div>
</main>

<script>
const MESES  = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const NIVEIS = [
  { pct: 71,  nome: 'Destrave dos Bônus' },
  { pct: 85,  nome: 'Happy Hour 🍻' },
  { pct: 95,  nome: 'Happy Hour Premium 🥂' },
  { pct: 100, nome: 'Festa Completa 🎊' },
];

function brl(v) {
  if (v == null) return '—';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function pctFmt(v, d=1) {
  if (v == null) return '—';
  return Number(v).toFixed(d) + '%';
}

function corPct(v) {
  if (v >= 100) return 'var(--green)';
  if (v >= 85)  return 'var(--yellow)';
  if (v >= 71)  return 'var(--orange)';
  return 'var(--red)';
}

function gradFin(pct) {
  if (pct >= 100) return 'linear-gradient(90deg, #16a34a, #22c55e)';
  if (pct >= 85)  return 'linear-gradient(90deg, #ca8a04, #f5c800)';
  if (pct >= 71)  return 'linear-gradient(90deg, #c2410c, #f97316)';
  return 'linear-gradient(90deg, #b91c1c, #ef4444)';
}

function gradReu(pct) {
  if (pct >= 100) return 'linear-gradient(90deg, #1d4ed8, #60a5fa)';
  if (pct >= 85)  return 'linear-gradient(90deg, #7c3aed, #a78bfa)';
  if (pct >= 71)  return 'linear-gradient(90deg, #0369a1, #38bdf8)';
  return 'linear-gradient(90deg, #1e3a5f, #3b82f6)';
}

async function carregar() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  document.getElementById('main').innerHTML =
    '<div class="estado"><div class="spinner"></div><span>Buscando dados...</span></div>';

  try {
    const resp = await fetch('/api/dados');
    const data = await resp.json();
    if (data.erro) throw new Error(data.erro);
    render(data);
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="estado"><span style="color:var(--red)">Erro: ${e.message}</span></div>`;
  } finally {
    btn.classList.remove('loading');
  }
}

function render(data) {
  const p   = data.periodo || {};
  const tot = data.total   || {};

  document.getElementById('h-sub').textContent =
    `${MESES[(p.mes||1)-1]}/${p.ano} · ${p.du_passados} de ${p.du_total} dias úteis · ${p.atualizado_em}`;

  const fin_meta  = tot.financeiro?.meta     || 0;
  const fin_real  = tot.financeiro?.realizado || 0;
  const fin_pct   = fin_meta ? fin_real / fin_meta * 100 : 0;

  const reu_meta  = tot.reunioes?.meta      || 0;
  const reu_real  = tot.reunioes?.validadas  || 0;
  const reu_pct   = reu_meta ? reu_real / reu_meta * 100 : 0;

  document.getElementById('main').innerHTML = `
    ${blocoBar({
      label:    'Meta Financeira · Closers',
      valor:    brl(fin_real),
      meta:     fin_meta,
      real:     fin_real,
      pct:      fin_pct,
      grad:     gradFin(fin_pct),
      fmt_meta: v => brl(v),
      fmt_gap:  v => brl(v),
      unidade:  '',
    })}

    ${blocoBar({
      label:    'Meta de Reuniões · SDRs',
      valor:    reu_real + ' reuniões',
      meta:     reu_meta,
      real:     reu_real,
      pct:      reu_pct,
      grad:     gradReu(reu_pct),
      fmt_meta: v => Math.round(v) + ' reu.',
      fmt_gap:  v => Math.round(v) + ' reu.',
      unidade:  ' reu.',
    })}

    <div class="updated">Atualizado em ${p.atualizado_em}</div>
  `;
}

function blocoBar({ label, valor, meta, real, pct, grad, fmt_meta, fmt_gap, unidade }) {
  const barW  = Math.min(pct, 100);
  const cor   = corPct(pct);

  // níveis
  const niveisMarks = NIVEIS.map(n => {
    const atingido = pct >= n.pct;
    const val_nivel = meta * n.pct / 100;
    const gap       = Math.max(val_nivel - real, 0);
    const proximo   = !atingido && NIVEIS.filter(x => pct < x.pct)[0]?.pct === n.pct;
    return { ...n, atingido, proximo, val_nivel, gap };
  });

  const marksHTML = niveisMarks.map(n => `
    <div class="nivel-mark" style="left:${n.pct}%">
      <div class="nivel-mark-line"></div>
    </div>
  `).join('');

  const labelsHTML = niveisMarks.map(n => `
    <div class="nivel-label" style="left:${n.pct}%">
      <span class="nl-pct" style="color:${n.atingido ? 'var(--green)' : n.proximo ? 'var(--yellow)' : 'var(--muted)'}">${n.pct}%</span>
      <span class="nl-nome">${fmt_meta(n.val_nivel)}</span>
    </div>
  `).join('');

  const cardsHTML = niveisMarks.map((n, i) => `
    <div class="nivel-card ${n.atingido ? 'atingido' : n.proximo ? 'proximo' : ''}">
      <div class="nivel-num">${i+1}</div>
      <div class="nivel-pct-label" style="color:${n.atingido ? 'var(--green)' : n.proximo ? 'var(--yellow)' : 'var(--muted)'}">
        ${n.pct}%
      </div>
      <div class="nivel-nome">${n.nome}</div>
      <div class="nivel-valor">Meta: ${fmt_meta(n.val_nivel)}</div>
      <div class="nivel-gap" style="color:${n.atingido ? 'var(--green)' : n.proximo ? 'var(--yellow)' : 'var(--red)'}">
        ${n.atingido ? '✓ Atingido' : 'Falta: ' + fmt_gap(n.gap)}
      </div>
      ${n.atingido ? '<div class="nivel-check">✓</div>' : ''}
      ${n.proximo  ? '<div class="nivel-check" style="color:var(--yellow)">→</div>' : ''}
    </div>
  `).join('');

  return `
  <div class="barra-bloco">
    <div class="barra-header">
      <div>
        <div class="barra-label">${label}</div>
        <div class="barra-valor" style="color:${cor}">${valor}</div>
      </div>
      <div>
        <div class="barra-meta">Meta total: ${fmt_meta(meta)}</div>
        <div class="barra-pct-big" style="color:${cor}">${pctFmt(pct)}</div>
      </div>
    </div>

    <div class="prog-container">
      <div class="prog-track">
        <div class="prog-fill" style="width:${barW}%;background:${grad}"></div>
        ${marksHTML}
      </div>
      <div class="niveis-labels">${labelsHTML}</div>
    </div>

    <div class="niveis-status">${cardsHTML}</div>
  </div>`;
}

carregar();
</script>
</body>
</html>
